project:
  type: website
  output-dir: docs

website:
  title: "Portfolio Construction and Risk Analysis"
  description: >
    Online appendices for the forthcoming Springer textbook by
    R. Douglas Martin, Thomas K. Philips, Bernd Scherer, and Kirk Li.

  navbar:
    background: dark
    foreground: light
    left:
      - text: "Home"
        href: index.qmd
      - text: "Preface"
        href: preface.qmd
      - text: "Vignettes"
        menu:
          - text: "1 — PCRA Package and Data Overview"
            href: vignette-1.qmd
          - text: "2 — CRSP Stocks and SPGMI Factors in PCRA"
            href: vignette-2.qmd
          - text: "3 — PCRA Reproducibility"
            href: vignette-3.qmd
          - text: "---"
          - text: "Reference Manual"
            href: reference-manual.qmd
          - text: "---"
          - text: "All Vignettes on GitHub"
            href: "https://github.com/robustport/PCRA/tree/main/vignettes"
      - text: "Demo Code"
        href: demo-code.qmd
      - text: "Appendices"
        menu:
          - text: "A — Mathematical Tools"
            href: appendix-a.qmd
          - text: "B — Probability & Statistics"
            href: appendix-b.qmd
          - text: "C — Utility Theory"
            href: appendix-c.qmd
          - text: "D — Portfolio Theory"
            href: appendix-d.qmd
          - text: "E — Machine Learning"
            href: appendix-e.qmd
      - text: "About"
        href: about.qmd

  page-footer:
    background: dark
    foreground: light
    left: "© 2025 Martin, Philips, Scherer & Li. All rights reserved."
    right: "Built with [Quarto](https://quarto.org)"

  search: true
  back-to-top-navigation: true

format:
  html:
    theme: lux
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    toc-expand: 2
    number-sections: false
    html-math-method: mathjax
    smooth-scroll: true
    link-external-newpage: true
    link-external-icon: true
    fig-cap-location: bottom
    fig-align: center
    lightbox: true

execute:
  freeze: auto
  echo: false
  warning: false
  message: false
