project:
  type: website
  output-dir: _site

website:
  title: "PCRA"
  description: >
    Online appendices for Portfolio Construction and Risk Analysis —
    a forthcoming Springer textbook by Martin, Philips, Scherer & Li.

  open-graph:
    title: "Portfolio Construction and Risk Analysis"
    description: >
      Online appendices covering mathematical tools, probability & statistics,
      utility theory, portfolio theory, and machine learning for investment management.
    image: ""

  navbar:
    background: "#0d1b2a"
    foreground: light
    title: "PCRA"
    left:
      - text: "Home"
        href: index.qmd
      - text: "Appendices"
        menu:
          - text: "A — Mathematical Tools"
            href: appendix-a.qmd
          - text: "B — Probability & Statistics"
            href: appendix-b.qmd
          - text: "C — Utility Theory"
            href: appendix-c.qmd
          - text: "D — Portfolio Theory"
            href: appendix-d.qmd
          - text: "E — Machine Learning"
            href: appendix-e.qmd
      - text: "About"
        href: about.qmd
    right:
      - icon: search
        href: "#"
        aria-label: Search

  page-footer:
    background: "#0d1b2a"
    foreground: light
    left: "© 2025 Martin, Philips, Scherer & Li. All rights reserved."
    right: "Built with [Quarto](https://quarto.org)"

  search:
    location: navbar
    type: overlay

  back-to-top-navigation: true

format:
  html:
    theme:
      - styles.css
    toc: true
    toc-depth: 3
    toc-title: "On this page"
    toc-expand: 2
    number-sections: false
    html-math-method: mathjax
    smooth-scroll: true
    link-external-newpage: true
    link-external-icon: true
    fig-cap-location: bottom
    fig-align: center
    lightbox: true
    include-in-header: _fonts.html
    grid:
      sidebar-width: 0px
      body-width: 900px
      margin-width: 250px

execute:
  freeze: auto
  echo: false
  warning: false
  message: false
